<!DOCTYPE html>

<html>

<head>
     <!-- when using the mode "code", it's important to specify charset utf-8 -->
    <meta charset="utf-8">
</head>

<body style="display: grid;place-items:center;height:100vh;">

<script type="module">
      import {load_resources, init_game, default_cfg, update_cfg} from "./util.js";

      async function run() {
        await load_resources();

        // Resize canvas when window resizes
        function resizeCanvas() {
            const canvas = document.getElementById('canvas');

            let wantedWidth = window.innerWidth * .95;
            let wantedHeight = wantedWidth * 9.0/16.0;

            if (wantedHeight > window.innerHeight * .95) {
              wantedHeight = window.innerHeight * .95;
              wantedWidth = wantedHeight * 16.0/9.0;
            }

            canvas.width = wantedWidth;
            canvas.height = wantedHeight;
        };
        resizeCanvas();

        window.addEventListener('resize', () => {
          resizeCanvas();
        }, false);

        init_game(document.getElementById('canvas'));
      }

      run();
</script>

<canvas id="canvas" style="border: 1px solid black;display: block"></canvas>

</body>
</html>
